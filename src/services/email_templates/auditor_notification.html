<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Souzet: New audit location assigned</title>
  </head>
  <body style="margin:0;padding:24px;font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;">
    <div style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
      <div style="padding:16px 20px;background:#0f172a;color:#ffffff;">
        <div style="font-size:16px;font-weight:700;">New audit location assigned</div>
        <div style="font-size:12px;opacity:0.85;">Souzet</div>
      </div>
      <div style="padding:20px;color:#111827;">
        <p style="margin:0 0 12px 0;">
          Dear <strong>{{auditor_name_or_email}}</strong>, a new location was assigned for your audit.
        </p>
        <p style="margin:0 0 12px 0;">
          It will take place at <strong>{{city}}</strong> <strong>{{zip}}</strong> at <strong>{{date}}</strong> <strong>{{time}}</strong>.
        </p>
        <p style="margin:16px 0 0 0;color:#6b7280;font-size:12px;">
          If you received this unexpectedly, you can ignore it.
        </p>
      </div>
    </div>
  </body>
</html>
